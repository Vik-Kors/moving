<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переезд</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        h2 { font-size: 18px; line-height: 1.4; margin-bottom: 25px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            background-color: #2481cc;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #form-container { display: none; text-align: left; margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-submit { background-color: #4CAF50; }
        .btn-submit:disabled { background-color: #aaaaaa !important; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="main-container">
        <h2>Приветствую друзья! Заполните анкету кто сможет мне помочь с переездом</h2>
        <button class="btn" onclick="selectCity('Москва')">Москва</button>
        <button class="btn" onclick="selectCity('Липецк')">Липецк</button>
    </div>

    <div id="form-container">
        <h3 id="form-title">Выбран город: </h3>
        
        <label>ФИО:</label>
        <input type="text" id="fio" placeholder="Иван Иванов">

        <label>Номер телефона:</label>
        <input type="text" id="phone" placeholder="+79991234567" oninput="this.value = this.value.replace(/[^0-9+\-\(\)\s]/g, '')">

        <button id="submit-btn" class="btn btn-submit" onclick="sendData()">Ответить</button>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();

        var chosenCity = '';

        function selectCity(city) {
            chosenCity = city;
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('form-title').innerText = 'Выбран город: ' + city;
        }

        function sendData() {
            var fioInput = document.getElementById('fio').value.trim();
            var phoneInput = document.getElementById('phone').value.trim();
            var submitBtn = document.getElementById('submit-btn');

            if (!fioInput || !phoneInput) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            // Блокируем кнопку сразу, чтобы исключить баги двойного клика
            submitBtn.disabled = true;
            submitBtn.innerText = "Отправлено!";

            // Показываем ваше уведомление
            alert("🎉 Спасибо за помощь!");

            // Создаем чистый плоский JSON-объект
            var dataObject = {
                city: chosenCity,
                fio: fioInput,
                phone: phoneInput
            };

            var stringData = JSON.stringify(dataObject);

            // МЕТОД 1: Стандартная отправка в бот (для телефонов и новых версий ТГ)
            try {
                tg.sendData(stringData);
            } catch(e) {
                console.log("Обычный метод не поддерживается");
            }

            // МЕТОД 2: Резервный бесшумный HTTP-запрос (для старых ПК, пробивает no-cors)
            var token = "8841092330:AAFBRPoKb-P1FsE0piP0Q_3UglwPEH9xW08";
            var chatId = "1626968504";
            var reportText = "🚚 **Новая анкета по переезду!**\n\n📍 **Город:** " + chosenCity + "\n👤 **ФИО:** " + fioInput + "\n📞 **Телефон:** " + phoneInput;
            var url = "https://telegram.org" + token + "/sendMessage?chat_id=" + chatId + "&text=" + encodeURIComponent(reportText) + "&parse_mode=Markdown";
            
            fetch(url, { mode: 'no-cors' });

            // Закрываем окно приложения
            setTimeout(function() {
                tg.close();
            }, 300);
        }
    </script>
</body>
</html>
