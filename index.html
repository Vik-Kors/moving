<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переезд</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        h2 { font-size: 20px; margin-bottom: 20px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            background-color: #2481cc;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #form-container { display: none; text-align: left; margin-top: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-submit { background-color: #4CAF50; }
    </style>
</head>
<body>

    <div id="main-container">
        <h2>Приветствую друзья! Заполните анкету кто сможет мне помочь с переездом</h2>
        <button class="btn" onclick="selectCity('Москва')">Москва</button>
        <button class="btn" onclick="selectCity('Липецк')">Липецк</button>
    </div>

    <div id="form-container">
        <h3 id="form-title">Выбран город: </h3>
        <label>ФИО:</label>
        <input type="text" id="fio" placeholder="Иван Иванов">
        <label>Номер телефона:</label>
        <input type="tel" id="phone" placeholder="+7 (999) 123-45-67">
        <button class="btn btn-submit" onclick="sendData()">Ответить</button>
    </div>

    <script>
        // Инициализация Telegram Web App безопасным способом
        let tg = window.Telegram.WebApp;
        
        try {
            tg.ready();
            tg.expand();
        } catch(e) {
            console.log("Ошибка инициализации ТГ:", e);
        }

        let chosenCity = '';

        function selectCity(city) {
            chosenCity = city;
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('form-title').innerText = 'Выбран город: ' + city;
        }

        function sendData() {
            const fio = document.getElementById('fio').value.trim();
            const phone = document.getElementById('phone').value.trim();

            if (!fio || !phone) {
                alert('Пожалуйста, заполните поля ФИО и Телефон!');
                return;
            }

            const payload = {
                city: chosenCity,
                fio: fio,
                phone: phone
            };

            try {
                // Отправляем строку JSON обратно в бота
                tg.sendData(JSON.stringify(payload));
            } catch(e) {
                alert("Ошибка отправки данных в Telegram. Попробуйте переоткрыть окно.");
            }
        }
    </script>
</body>
</html>
