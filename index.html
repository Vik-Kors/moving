<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переезд</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            text-align: center;
            padding: 20px;
        }
        h2 { font-size: 18px; line-height: 1.4; margin-bottom: 25px; }
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 18px;
            font-weight: bold;
            background-color: #2481cc;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #form-container { display: none; text-align: left; margin-top: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .btn-submit { background-color: #4CAF50; }
        /* Стиль для заблокированной кнопки */
        .btn-submit:disabled {
            background-color: #aaaaaa !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div id="main-container">
        <h2>Приветствую друзья! Заполните анкету кто сможет мне помочь с переездом</h2>
        <button class="btn" onclick="selectCity('Москва')">Москва</button>
        <button class="btn" onclick="selectCity('Липецк')">Липецк</button>
    </div>

    <div id="form-container">
        <h3 id="form-title">Выбран город: </h3>
        
        <label>ФИО:</label>
        <input type="text" id="fio" placeholder="Иван Иванов">

        <label>Номер телефона (только цифры и знаки +, -, ( ) ):</label>
        <!-- Добавили валидацию ввода прямо в процессе набора -->
        <input type="text" id="phone" placeholder="+79991234567" oninput="validatePhone(this)">

        <button id="submit-btn" class="btn btn-submit" onclick="sendData()">Ответить</button>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.expand();

        var chosenCity = '';

        function selectCity(city) {
            chosenCity = city;
            document.getElementById('main-container').style.display = 'none';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('form-title').innerText = 'Выбран город: ' + city;
        }

        // Функция разрешает вводить только цифры, плюс, минусы и скобки
        function validatePhone(input) {
            input.value = input.value.replace(/[^0-9+\-\(\)\s]/g, '');
        }

        function sendData() {
            var fioInput = document.getElementById('fio').value.trim();
            var phoneInput = document.getElementById('phone').value.trim();
            var submitBtn = document.getElementById('submit-btn');

            if (!fioInput || !phoneInput) {
                alert('Пожалуйста, заполните все поля!');
                return;
            }

            // Дополнительная проверка номера перед отправкой
            var phoneCheck = /^[0-9+\-\(\)\s]+$/;
            if (!phoneCheck.test(phoneInput)) {
                alert('В номере телефона разрешены только цифры и символы +, -, ()');
                return;
            }

            // 1. Блокируем кнопку, чтобы не нажали второй раз
            submitBtn.disabled = true;
            submitBtn.innerText = "Отправлено!";

            // 2. Показываем уведомление
            alert("🎉 Спасибо за помощь!");

            // 3. Склеиваем и отправляем данные в бот
            var resultString = chosenCity + " | " + fioInput + " | " + phoneInput + " | СЕКРЕТ_ПЕРЕЕЗД";
            tg.sendData(resultString);

            // 4. Закрываем окно Web App автоматически через секунду после отправки
            setTimeout(function() {
                tg.close();
            }, 500);
        }
    </script>
</body>
</html>
